const { useState, useEffect, useRef } = React;
const SCROLL_TOP_OFFSET = 88;
let smoothScrollTimer = null;
const smoothScrollToNode = (node, extraOffset = SCROLL_TOP_OFFSET, delay = 120) => {
    if (!node)
        return;
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    window.clearTimeout(smoothScrollTimer);
    smoothScrollTimer = window.setTimeout(() => {
        window.requestAnimationFrame(() => {
            const rect = node.getBoundingClientRect();
            const targetTop = Math.max(window.scrollY + rect.top - extraOffset, 0);
            if (Math.abs(window.scrollY - targetTop) < 6)
                return;
            window.scrollTo({ top: targetTop, behavior: prefersReducedMotion ? 'auto' : 'smooth' });
        });
    }, delay);
};
const getSecondaryTabClass = (isActive, allowWrap = false) => `px-5 py-2.5 rounded-full font-bold transition-all ${allowWrap ? 'text-xs sm:text-sm leading-tight whitespace-normal break-words min-h-[46px] flex items-center justify-center text-center' : 'text-sm whitespace-nowrap'} ${isActive

    : 'bg-[#f5f5f7] dark:bg-[#1c1c1e] text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200'}`;

const AnimatedCollapse = ({ isOpen, children, className = "", contentClassName = "", style = {} }) => {
    const innerRef = useRef(null);
    const [height, setHeight] = useState(isOpen ? 'auto' : 0);
    useEffect(() => {
        const node = innerRef.current;
        if (!node)
            return;
        let raf;
        let timer;
        let resizeObserver;
        const measure = () => setHeight(node.scrollHeight);
        if (isOpen) {
            raf = window.requestAnimationFrame(measure);
            if (window.ResizeObserver) {
                resizeObserver = new ResizeObserver(() => {
                    if (height !== 'auto') {
                        measure();
                    }
                });
                resizeObserver.observe(node);
            }
            timer = window.setTimeout(() => setHeight('auto'), 440);
            return () => {
                if (raf)
                    window.cancelAnimationFrame(raf);
                if (timer)
                    window.clearTimeout(timer);
                if (resizeObserver)
                    resizeObserver.disconnect();
            };
        }
        const fullHeight = node.scrollHeight;
        setHeight(fullHeight);
        raf = window.requestAnimationFrame(() => setHeight(0));
        return () => {
            if (raf)
                window.cancelAnimationFrame(raf);
        };
    }, [isOpen, children]);
    return React.createElement("div", { className: className, style: Object.assign({
            overflow: 'hidden',
            maxHeight: typeof height === 'number' ? `${height}px` : height,
            opacity: isOpen ? 1 : 0,
            transition: 'max-height 440ms cubic-bezier(0.16, 1, 0.3, 1), opacity 220ms ease'
        }, style) },
        React.createElement("div", { ref: innerRef, className: `${contentClassName}${isOpen ? ' micro-card-opening' : ''}` }, children));
};
