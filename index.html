<!DOCTYPE html>
<html lang="ru">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {

            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'

    <style>

        .dark .glass-card { border: 1px solid rgba(255,255,255,0.1); }

<body class="bg-slate-50 text-slate-900 dark:bg-darkBg dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UI Компоненты ---
        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (

                            <button onClick={onClose} className="p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full">✕</button>

            const [darkMode, setDarkMode] = useState(false);

            // Компонент Контактов для переиспользования

                            <div className="flex flex-col text-left">

                                <span className="font-semibold">8 (927) 265-17-77</span>
                            </div>
                            <span className="text-blue-500 text-xl">📞</span>
                        </a>
                        <a href="tel:+79376420767" className="flex items-center justify-between p-3 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-xl transition-colors">

                            <span className="font-medium">max.safrutin@gmail.com</span>
                            <span className="text-blue-500">📧</span>
                        </a>
                        <a href="mailto:max.safr18@yandex.ru" className="flex items-center justify-between p-3 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-xl transition-colors">
                            <span className="font-medium">max.safr18@yandex.ru</span>
                            <span className="text-blue-500">📨</span>

                                        <p className="opacity-70 italic mb-4">«Система всегда побеждает хаос».</p>
                                        <p className="opacity-90 leading-relaxed">Увлекаюсь яхтингом и марафонским бегом. Считаю, что дисциплина в спорте напрямую переносится в бизнес.</p>
                                    </div>
                                    <div className="bg-blue-600 text-white p-8 rounded-[2.5rem]">

                                    </div>
                                </div>
                            </div>
                        )}

                        {activeSection === 'experience' && (

                                {/* Timeline с Отзывами (ПК: бок о бок, Моб: друг под другом) */}

                                        <div key={idx} className="flex flex-col lg:flex-row gap-6">

                                                <h3 className="text-2xl font-bold mt-1">{item.company}</h3>

                                            </div>

                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeSection === 'skills' && (
                            <div className="space-y-12">
                                <h2 className="text-4xl font-extrabold">Навыки и Стек</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white dark:bg-darkCard p-8 rounded-3xl border border-slate-100 dark:border-slate-800">
                                        <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><span>📈</span> Продажи и Переговоры</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {["B2B & B2C", "Сложные переговоры", "Импорт авто", "Управление воронкой"].map(s => (
                                                <span key={s} className="bg-slate-100 dark:bg-slate-800 px-4 py-2 rounded-xl text-sm">{s}</span>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white dark:bg-darkCard p-8 rounded-3xl border border-slate-100 dark:border-slate-800">
                                        <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><span>🤖</span> AI и Технологии</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {["ChatGPT (Prompts)", "CRM системы", "Data Analytics", "Notion/Obsidian"].map(s => (
                                                <span key={s} className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-4 py-2 rounded-xl text-sm">{s}</span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeSection === 'contacts' && (
                            <div className="text-center py-12 space-y-12">
                                <h2 className="text-4xl font-extrabold">Готовы к новому опыту?</h2>

                    </main>

                        <div className="flex justify-around items-center h-16 px-4">

                                { id: 'contacts', label: 'Контакты', icon: '📞' }

</body>
</html>
