<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume.Safrutin | Максим Сафрутин</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        appleGray: '#f5f5f7',
                        appleBlue: '#0066cc'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .apple-shadow { box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
        .modal-blur { backdrop-filter: blur(20px); background: rgba(255,255,255,0.8); }
        .dark .modal-blur { background: rgba(28,28,30,0.8); }
        .transition-all { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        details summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-white text-[#1d1d1f] dark:bg-[#000000] dark:text-[#f5f5f7]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animate-in fade-in duration-300" style={{background: 'rgba(0,0,0,0.5)'}} onClick={onClose}>
                    <div className="modal-blur dark:bg-[#1c1c1e] rounded-[2.5rem] max-w-2xl w-full max-h-[90vh] overflow-y-auto p-10 apple-shadow shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-8">
                            <h3 className="text-3xl font-bold tracking-tight">{title}</h3>
                            <button onClick={onClose} className="w-10 h-10 flex items-center justify-center bg-gray-100 dark:bg-gray-800 rounded-full text-xl">✕</button>
                        </div>
                        <div className="text-lg leading-relaxed space-y-6 text-gray-700 dark:text-gray-300">{children}</div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeSection, setActiveSection] = useState('profile');
            const [darkMode, setDarkMode] = useState(false);
            const [isAboutOpen, setIsAboutOpen] = useState(false);

            const toggleDarkMode = () => {
                setDarkMode(!darkMode);
                document.documentElement.classList.toggle('dark');
            };

            return (
                <div className="min-h-screen pb-32">
                    {/* Header */}
                    <nav className="fixed top-0 w-full bg-white/70 dark:bg-black/70 backdrop-blur-md z-50">
                        <div className="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
                            <button onClick={() => setActiveSection('profile')} className="text-lg font-bold tracking-tight">
                                Resume.<span className="text-blue-600">Safrutin</span>
                            </button>
                            <button onClick={toggleDarkMode} className="p-2 rounded-full bg-gray-100 dark:bg-gray-800 transition-all">
                                {darkMode ? '☀️' : '🌙'}
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto px-6 pt-24 transition-all">
                        
                        {/* SECTION: PROFILE */}
                        {activeSection === 'profile' && (
                            <div className="space-y-16 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                
                                {/* Hero - Centered Vertical */}
                                <header className="flex flex-col items-center text-center py-10 space-y-6">
                                    <div className="w-40 h-40 md:w-52 md:h-52 rounded-[3rem] overflow-hidden apple-shadow ring-1 ring-black/5">
                                        <img src="https://ui-avatars.com/api/?name=Максим+Сафрутин&background=f5f5f7&color=000&size=512" alt="Maxim Safrutin" className="w-full h-full object-cover" />
                                    </div>
                                    <div className="space-y-3">
                                        <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight">Максим Сафрутин</h1>
                                        <p className="text-xl md:text-2xl text-gray-500 font-medium max-w-2xl">
                                            Менеджер по продажам автомобилей <span className="block md:inline text-gray-400 font-light text-lg lg:text-xl">(импорт и подбор под заказ)</span>
                                        </p>
                                        <p className="flex items-center justify-center gap-2 text-gray-400 font-medium">
                                            <span>📍 Самара, Россия</span>
                                        </p>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setActiveSection('contacts')} className="bg-[#0071e3] text-white px-8 py-4 rounded-full font-semibold text-lg hover:bg-[#0077ed] transition-all">Связаться</button>
                                        <button onClick={() => setActiveSection('experience')} className="bg-[#f5f5f7] dark:bg-gray-800 text-[#1d1d1f] dark:text-white px-8 py-4 rounded-full font-semibold text-lg hover:bg-gray-200 transition-all">Открыть опыт</button>
                                    </div>
                                </header>

                                {/* Key Numbers */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-10 rounded-[2.5rem] text-center transition-all hover:scale-[1.02]">
                                        <div className="text-5xl font-bold mb-2">667+</div>
                                        <div className="text-sm uppercase tracking-widest text-gray-400 font-bold">Продано авто</div>
                                    </div>
                                    <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-10 rounded-[2.5rem] text-center transition-all hover:scale-[1.02]">
                                        <div className="text-5xl font-bold mb-2">424+</div>
                                        <div className="text-sm uppercase tracking-widest text-gray-400 font-bold">Млн ₽ оборот</div>
                                    </div>
                                    <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-10 rounded-[2.5rem] text-center transition-all hover:scale-[1.02]">
                                        <div className="text-5xl font-bold mb-2">22+</div>
                                        <div className="text-sm uppercase tracking-widest text-gray-400 font-bold">Млн ₽ прибыль</div>
                                    </div>
                                </div>

                                {/* Who Am I */}
                                <section className="max-w-3xl mx-auto text-center space-y-8">
                                    <p className="text-2xl md:text-3xl leading-snug font-medium text-gray-800 dark:text-gray-200">
                                        С 1993 года — в переговорах, с 2020 — в автомобильных. Увеличиваю прибыль компании через доверие и решение задачи клиента, то есть конвертирую запрос в сделку. Работаю системно и использую в том числе AI-инструменты для повышения конверсии продаж.
                                    </p>
                                    <button onClick={() => setIsAboutOpen(true)} className="text-[#0066cc] text-xl font-semibold hover:underline underline-offset-8">
                                        Подробнее об экспертизе →
                                    </button>
                                </section>

                                {/* Personal & Travel (Moved here as requested) */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-[#1d1d1f] text-white p-12 rounded-[3rem] apple-shadow">
                                        <h3 className="text-3xl font-bold mb-6">Личное</h3>
                                        <p className="text-xl opacity-60 italic mb-6">«Система всегда побеждает хаос».</p>
                                        <p className="text-xl leading-relaxed opacity-90 font-light">Увлекаюсь яхтингом и марафонским бегом. Считаю, что дисциплина в спорте напрямую переносится в бизнес.</p>
                                    </div>
                                    <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-12 rounded-[3rem] apple-shadow">
                                        <h3 className="text-3xl font-bold mb-6 tracking-tight">Путешествия</h3>
                                        <p className="text-xl leading-relaxed text-gray-600 dark:text-gray-400 font-light">35 стран, от Исландии до Японии. Люблю изучать локальные бизнес-культуры и находить новые подходы в коммуникациях.</p>
                                        <div className="text-5xl mt-10">🌍 🏔️ 🏎️</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SECTION: EXPERIENCE */}
                        {activeSection === 'experience' && (
                            <div className="space-y-12 animate-in fade-in duration-500">
                                <h2 className="text-5xl font-extrabold tracking-tight mb-12">Опыт и Отзывы</h2>
                                <div className="space-y-8">
                                    {[
                                        { company: "АвтоИмпорт Про", role: "Ведущий менеджер", year: "2020 — Наст. время", review: "Максим подобрал автомобиль, о котором я мечтал, соблюдая все дедлайны." },
                                        { company: "Premium Cars", role: "Sales Expert", year: "2018 — 2020", review: "Исключительный уровень сервиса и знание рынка." }
                                    ].map((item, idx) => (
                                        <div key={idx} className="flex flex-col lg:flex-row gap-6 items-stretch">
                                            <div className="lg:w-1/2 bg-[#f5f5f7] dark:bg-[#1c1c1e] p-10 rounded-[2.5rem] transition-all">
                                                <span className="text-blue-600 font-bold uppercase tracking-widest text-xs">{item.year}</span>
                                                <h3 className="text-3xl font-bold mt-2">{item.company}</h3>
                                                <p className="text-xl text-gray-500 mt-1">{item.role}</p>
                                            </div>
                                            <div className="lg:w-1/2 bg-white dark:bg-black p-10 rounded-[2.5rem] border border-gray-100 dark:border-gray-800 flex flex-col justify-center italic">
                                                <p className="text-xl text-gray-600 dark:text-gray-400">"{item.review}"</p>
                                                <p className="mt-4 font-bold text-sm not-italic text-gray-400">— Отзыв клиента</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* SECTION: SKILLS */}
                        {activeSection === 'skills' && (
                            <div className="space-y-12 animate-in fade-in duration-500">
                                <h2 className="text-5xl font-extrabold tracking-tight mb-12">Навыки и Стек</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="space-y-6">
                                        <h3 className="text-2xl font-bold px-4">Продажи</h3>
                                        <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-8 rounded-[2.5rem] space-y-4">
                                            {["B2B Продажи", "Сложные переговоры", "Импорт/Экспорт", "CRM Архитектура"].map(s => (
                                                <div key={s} className="bg-white dark:bg-black p-4 rounded-2xl apple-shadow font-medium">{s}</div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <h3 className="text-2xl font-bold px-4">Технологии</h3>
                                        <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-8 rounded-[2.5rem] space-y-4">
                                            {["ChatGPT Prompting", "AmoCRM / Bitrix24", "Excel Data Viz", "Notion Expert"].map(s => (
                                                <div key={s} className="bg-white dark:bg-black p-4 rounded-2xl apple-shadow font-medium text-blue-600">{s}</div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SECTION: CONTACTS */}
                        {activeSection === 'contacts' && (
                            <div className="text-center py-12 animate-in fade-in duration-500">
                                <h2 className="text-5xl font-extrabold tracking-tight mb-4">Готовы к новому опыту?</h2>
                                <p className="text-xl text-gray-500 mb-12">Свяжитесь со мной любым удобным способом</p>
                                
                                <div className="max-w-xl mx-auto bg-[#f5f5f7] dark:bg-[#1c1c1e] p-10 rounded-[3rem] space-y-6 text-left">
                                    <a href="tel:+79272651777" className="block p-6 bg-white dark:bg-black rounded-3xl apple-shadow hover:scale-[1.02] transition-all">
                                        <div className="text-xs text-gray-400 font-bold uppercase mb-1">Личный сотовый</div>
                                        <div className="text-2xl font-bold">8 (927) 265-17-77</div>
                                    </a>
                                    <a href="tel:+79376420767" className="block p-6 bg-white dark:bg-black rounded-3xl apple-shadow hover:scale-[1.02] transition-all">
                                        <div className="text-xs text-gray-400 font-bold uppercase mb-1">Сотовый супруги</div>
                                        <div className="text-2xl font-bold">8 (937) 642-07-67</div>
                                    </a>
                                    <a href="mailto:max.safrutin@gmail.com" className="block p-6 bg-white dark:bg-black rounded-3xl apple-shadow hover:scale-[1.02] transition-all">
                                        <div className="text-xs text-gray-400 font-bold uppercase mb-1">Email (Primary)</div>
                                        <div className="text-2xl font-bold">max.safrutin@gmail.com</div>
                                    </a>
                                    <div className="p-6 text-gray-500 text-lg leading-relaxed">
                                        📍 г. Самара, 443028, мкр-н Крутые ключи, ул. Мира
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 dark:bg-[#1c1c1e]/80 backdrop-blur-2xl rounded-full apple-shadow border border-gray-200 dark:border-gray-800 z-50">
                        <div className="flex justify-around items-center h-20 px-4">
                            {[
                                { id: 'profile', label: 'Профиль', icon: '👤' },
                                { id: 'experience', label: 'Опыт', icon: '💼' },
                                { id: 'skills', label: 'Навыки', icon: '⚡' },
                                { id: 'contacts', label: 'Контакты', icon: '📞' }
                            ].map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveSection(tab.id)}
                                    className={`flex flex-col items-center justify-center transition-all px-4 ${activeSection === tab.id ? 'text-blue-600' : 'text-gray-400'}`}
                                >
                                    <span className="text-2xl">{tab.icon}</span>
                                    <span className="text-[10px] font-bold uppercase mt-1 tracking-tighter">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Modal About */}
                    <Modal isOpen={isAboutOpen} onClose={() => setIsAboutOpen(false)} title="О специалисте">
                        <p>Более 12 лет в управлении продажами. Подход — через data-driven решения. В продажах выстраиваю собственную архитектуру процессов, которая делает результат для руководства прогнозируемым и масштабируемым.</p>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 py-6">
                            {[
                                { val: "192+ недель", txt: "Опыт преподавания и работы с аудиторией (школа и университет)." },
                                { val: "1340+ дней", txt: "Практического опыта продаж в автомобильном бизнесе." },
                                { val: "1198+", txt: "Положительных отзывов от клиентов." },
                                { val: ">876", txt: "Организованных и реализованных фриланс-проектов." }
                            ].map((item, i) => (
                                <div key={i} className="p-6 bg-gray-50 dark:bg-gray-800/50 rounded-3xl">
                                    <div className="text-xl font-bold text-blue-600 mb-2">{item.val}</div>
                                    <div className="text-sm leading-snug">{item.txt}</div>
                                </div>
                            ))}
                        </div>

                        <p className="text-gray-600 dark:text-gray-400 border-l-2 border-gray-200 dark:border-gray-700 pl-6 italic">
                            Убеждён, что эффективная работа строится не только на договорах и регламентах, но прежде всего на живых человеческих отношениях и взаимном доверии. Именно такие отношения между специалистом и работодателем позволяют достигать общей цели — устойчивого роста и финансового результата.
                        </p>

                        <button 
                            onClick={() => { setIsAboutOpen(false); setActiveSection('skills'); }}
                            className="w-full mt-8 bg-black dark:bg-white text-white dark:text-black py-5 rounded-3xl font-bold text-lg"
                        >
                            Подробнее про навыки
                        </button>
                    </Modal>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
