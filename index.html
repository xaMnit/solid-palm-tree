<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Dossier | Professional Profile</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; color: #1d1d1f; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.05); }
        .gradient-text { background: linear-gradient(90deg, #000, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        details summary::-webkit-details-marker { display: none; }
        .smooth-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UI Компоненты ---

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={onClose}>
                    <div className="bg-white rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-8 shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-2xl font-bold">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full">✕</button>
                        </div>
                        <div className="text-gray-600 leading-relaxed">{children}</div>
                    </div>
                </div>
            );
        };

        const AnimatedCounter = ({ value, label }) => {
            const [count, setCount] = useState(0);
            useEffect(() => {
                let start = 0;
                const end = parseInt(value);
                if (start === end) return;
                let timer = setInterval(() => {
                    start += Math.ceil(end / 50);
                    if (start >= end) {
                        setCount(end);
                        clearInterval(timer);
                    } else {
                        setCount(start);
                    }
                }, 30);
                return () => clearInterval(timer);
            }, [value]);

            return (
                <div className="p-6 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md smooth-transition">
                    <div className="text-3xl font-bold text-black mb-1">{count}{value.includes('+') ? '+' : ''}</div>
                    <div className="text-sm text-gray-500 uppercase tracking-wider font-medium">{label}</div>
                </div>
            );
        };

        // --- Секции ---

        const App = () => {
            const [activeModal, setActiveModal] = useState(null);
            const [activeTab, setActiveTab] = useState('sales');

            const skills = {
                sales: ["B2B продажи", "Воронки в CRM", "Холодный поиск", "Работа с возражениями"],
                tech: ["ChatGPT / Prompt Engineering", "Python (основы)", "SQL", "Notion Architecture"],
                analytics: ["Power BI", "Unit-экономика", "Google Sheets (Expert)"]
            };

            return (
                <div className="max-w-4xl mx-auto px-6 py-12">
                    
                    {/* 1. HERO BLOCK */}
                    <header className="text-center py-20 mb-12">
                        <h1 className="text-5xl md:text-7xl font-bold mb-6 tracking-tight gradient-text">Иван Иванов</h1>
                        <p className="text-xl md:text-2xl text-gray-500 mb-10 font-light">Senior Sales Architect & Operations Manager</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
                            <AnimatedCounter value="630+" label="Продано авто" />
                            <AnimatedCounter value="311" label="Млн ₽ оборот" />
                            <AnimatedCounter value="14" label="Млн ₽ прибыль" />
                        </div>

                        <div className="flex flex-wrap justify-center gap-4">
                            <a href="#contacts" className="bg-black text-white px-8 py-4 rounded-full font-medium hover:bg-gray-800 smooth-transition">Связаться</a>
                            <button onClick={() => document.getElementById('experience').scrollIntoView()} className="bg-gray-100 text-black px-8 py-4 rounded-full font-medium hover:bg-gray-200 smooth-transition">Открыть опыт</button>
                        </div>
                    </header>

                    {/* 2. WHO AM I */}
                    <section className="mb-24 text-center">
                        <p className="text-2xl text-gray-700 leading-snug mb-6 max-w-2xl mx-auto">
                            Специализируюсь на построении системных продаж и автоматизации бизнес-процессов. Помогаю компаниям расти через цифры и AI-инструменты.
                        </p>
                        <button onClick={() => setActiveModal('about')} className="text-blue-600 font-medium hover:underline">Подробнее об экспертизе →</button>
                    </section>

                    {/* 4. EXPERIENCE (Timeline) */}
                    <section id="experience" className="mb-24">
                        <h2 className="text-3xl font-bold mb-10">Опыт работы</h2>
                        <div className="space-y-8 border-l-2 border-gray-100 ml-4 pl-8 relative">
                            {[
                                { company: "Global Auto Group", role: "Head of Sales", year: "2021 — 2024", desc: "Увеличение прибыли отдела на 40% за год." },
                                { company: "Tech Solutions", role: "Account Manager", year: "2018 — 2021", desc: "Внедрение CRM и автоматизация отчетности." }
                            ].map((job, i) => (
                                <div key={i} className="relative mb-12">
                                    <div className="absolute -left-[41px] top-1 w-4 h-4 rounded-full bg-black border-4 border-white"></div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-50 hover:border-gray-200 smooth-transition cursor-pointer" 
                                         onClick={() => setActiveModal(`job-${i}`)}>
                                        <span className="text-sm text-gray-400 font-medium">{job.year}</span>
                                        <h3 className="text-xl font-bold mt-1">{job.company}</h3>
                                        <p className="text-gray-500">{job.role}</p>
                                        <p className="mt-4 text-blue-600 text-sm font-medium italic">Нажми, чтобы увидеть результаты ↓</p>
                                    </div>
                                    <Modal 
                                        isOpen={activeModal === `job-${i}`} 
                                        onClose={() => setActiveModal(null)} 
                                        title={`${job.role} @ ${job.company}`}
                                    >
                                        <h4 className="font-bold text-black mb-2">Ключевые задачи:</h4>
                                        <ul className="list-disc ml-5 mb-4">
                                            <li>Управление командой из 15 человек</li>
                                            <li>Оптимизация воронки продаж</li>
                                        </ul>
                                        <h4 className="font-bold text-black mb-2">Результаты:</h4>
                                        <div className="bg-green-50 p-4 rounded-xl text-green-800">{job.desc}</div>
                                    </Modal>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* 5. REVIEWS (Cards) */}
                    <section className="mb-24">
                        <h2 className="text-3xl font-bold mb-8">Отзывы</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                <p className="text-gray-600 mb-6 italic">"Иван перестроил нашу CRM за месяц, после чего конверсия выросла вдвое..."</p>
                                <div className="flex justify-between items-center">
                                    <div>
                                        <div className="font-bold">Александр Витте</div>
                                        <div className="text-sm text-gray-400">CEO, AutoDrive</div>
                                    </div>
                                    <button onClick={() => setActiveModal('review-1')} className="text-xs bg-gray-100 px-3 py-2 rounded-lg hover:bg-gray-200">Весь текст</button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 6 & 7. SKILLS (Tabs) */}
                    <section className="mb-24 bg-gray-50 p-8 rounded-3xl">
                        <h2 className="text-3xl font-bold mb-8 text-center">Навыки и Стек</h2>
                        <div className="flex justify-center gap-2 mb-8 bg-gray-200 p-1 rounded-xl w-fit mx-auto">
                            {['sales', 'tech', 'analytics'].map(tab => (
                                <button 
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-6 py-2 rounded-lg text-sm font-medium smooth-transition ${activeTab === tab ? 'bg-white shadow-sm' : 'text-gray-500 hover:text-black'}`}
                                >
                                    {tab.toUpperCase()}
                                </button>
                            ))}
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {skills[activeTab].map(skill => (
                                <div key={skill} className="bg-white p-4 rounded-xl text-center shadow-sm text-sm font-medium border border-gray-100">
                                    {skill}
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* 10. PERSONAL & TRAVEL */}
                    <section className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-24">
                        <div className="bg-black text-white p-10 rounded-3xl">
                            <h3 className="text-2xl font-bold mb-4">Личное</h3>
                            <p className="opacity-80 leading-relaxed">
                                «Система всегда побеждает хаос». <br/><br/>
                                Увлекаюсь яхтингом и марафонским бегом. Считаю, что дисциплина в спорте напрямую переносится в бизнес.
                            </p>
                        </div>
                        <div className="bg-blue-600 text-white p-10 rounded-3xl relative overflow-hidden">
                            <h3 className="text-2xl font-bold mb-4">Путешествия</h3>
                            <p className="opacity-80">35 стран, от Исландии до Японии. Люблю изучать локальные бизнес-культуры.</p>
                            <div className="mt-8 text-4xl">🌍 🏔️ ✈️</div>
                        </div>
                    </section>

                    {/* 12. CONTACTS */}
                    <footer id="contacts" className="text-center py-20 bg-white rounded-[3rem] shadow-xl border border-gray-100">
                        <h2 className="text-4xl font-bold mb-4">Готовы к новому проекту?</h2>
                        <p className="text-gray-500 mb-10">Напишите мне в удобном мессенджере</p>
                        <div className="flex flex-wrap justify-center gap-4 px-6">
                            <a href="tel:+70000000000" className="flex items-center gap-2 bg-gray-100 px-6 py-3 rounded-2xl hover:bg-gray-200 smooth-transition">
                                📞 Позвонить
                            </a>
                            <a href="https://t.me/" className="flex items-center gap-2 bg-[#229ED9] text-white px-6 py-3 rounded-2xl hover:opacity-90 smooth-transition">
                                Telegram
                            </a>
                            <a href="mailto:test@test.com" className="flex items-center gap-2 bg-black text-white px-6 py-3 rounded-2xl hover:bg-gray-800 smooth-transition">
                                Email
                            </a>
                        </div>
                    </footer>

                    {/* Modals Data */}
                    <Modal isOpen={activeModal === 'about'} onClose={() => setActiveModal(null)} title="О специалисте">
                        <p>Более 10 лет в управлении продажами. Мой подход базируется на Data-driven решениях. Я не просто "продаю", я строю архитектуру, которая делает процесс прогнозируемым и масштабируемым.</p>
                    </Modal>

                    <Modal isOpen={activeModal === 'review-1'} onClose={() => setActiveModal(null)} title="Отзыв: Александр Витте">
                        <p>Иван продемонстрировал исключительный уровень понимания бизнес-процессов. Помимо настройки CRM, он провел обучение всей команды (20+ человек) и внедрил систему ежедневной отчетности, которая сэкономила нам до 15 часов менеджерского времени в неделю.</p>
                    </Modal>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
