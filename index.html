<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Safrutin | Digital Dossier</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        appleGray: '#f5f5f7',
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            font-size: 14px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .apple-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .nav-blur { backdrop-filter: blur(20px); background: rgba(255,255,255,0.8); }
        .dark .nav-blur { background: rgba(0,0,0,0.8); }
        .animate-fade-up { animation: fadeUp 0.5s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-[#1d1d1f] dark:bg-black dark:text-[#f5f5f7]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Counter = ({ endValue, suffix = "" }) => {
            const [count, setCount] = useState(0);
            useEffect(() => {
                let start = 0;
                const duration = 1000;
                const increment = Math.ceil(endValue / (duration / 20));
                const timer = setInterval(() => {
                    start += increment;
                    if (start >= endValue) {
                        setCount(endValue);
                        clearInterval(timer);
                    } else {
                        setCount(start);
                    }
                }, 20);
                return () => clearInterval(timer);
            }, [endValue]);
            return <span>{count}{suffix}</span>;
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-white dark:bg-[#1c1c1e] rounded-[2rem] max-w-lg w-full max-h-[85vh] overflow-y-auto p-8 shadow-2xl animate-fade-up" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xl font-bold">{title}</h3>
                            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center bg-gray-100 dark:bg-gray-800 rounded-full hover:bg-gray-200 transition-colors">✕</button>
                        </div>
                        <div className="text-base leading-relaxed space-y-4 text-gray-700 dark:text-gray-300">{children}</div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeSection, setActiveSection] = useState('profile');
            const [darkMode, setDarkMode] = useState(false);
            const [isAboutOpen, setIsAboutOpen] = useState(false);

            const toggleDarkMode = () => {
                setDarkMode(!darkMode);
                document.documentElement.classList.toggle('dark');
            };

            const experiences = [
                {
                    company: "ООО «Урал-Лада» (АМК)",
                    role: "Корпоративный менеджер / Юр. лица",
                    year: "2023 — 2026",
                    details: "Продажа LADA юрлицам. Реализовал 630+ авто, оборот 311 млн ₽, прибыль 14 млн ₽. Полное сопровождение сделок, тендеры, CRM, ЭДО.",
                    review: "Максим — один из тех, кому можно доверить направление. Всегда доводит до результата. (А. Мовчан)"
                },
                {
                    company: "Автосеть.РФ (АМК)",
                    role: "Менеджер отдела продаж (БУ)",
                    year: "2023",
                    details: "Стабильное 1-2 место по продажам. Изучил книгу продаж за 2 дня на 97/100 баллов.",
                    review: "Глубоко погружается в процессы. Создал видеоуроки для новых менеджеров. (Д. Якупов)"
                },
                {
                    company: "РусБизнесАвто (РБА)",
                    role: "Региональный менеджер (Спецтехника)",
                    year: "2022",
                    details: "Активный поиск, 780+ контактов. Единственный кандидат, который пришел сам без звонка и презентовал себя.",
                    review: "На следующий день сам приехал в кабинет и презентовал себя. (Т. Хафизов)"
                }
            ];

            return (
                <div className="min-h-screen pb-28">
                    <nav className="fixed top-0 w-full nav-blur z-50 border-b border-gray-100 dark:border-gray-900">
                        <div className="max-w-4xl mx-auto px-6 h-14 flex items-center justify-between">
                            <button onClick={() => setActiveSection('profile')} className="text-base font-bold tracking-tight">
                                Max <span className="text-blue-600">Safrutin</span>
                            </button>
                            <button onClick={toggleDarkMode} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                                {darkMode ? <i className="fa-solid fa-sun text-sm"></i> : <i className="fa-solid fa-moon text-sm"></i>}
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-6 pt-20">
                        {activeSection === 'profile' && (
                            <div className="space-y-10 animate-fade-up">
                                <header className="flex flex-col items-center text-center py-6 space-y-4">
                                    <div className="w-32 h-32 md:w-40 md:h-40 rounded-[2.5rem] overflow-hidden apple-shadow ring-1 ring-black/5">
                                        <img src="https://raw.githubusercontent.com/MaximSafrutin/MaxS/main/assets/avatar/avatar_safrutin_pro.png" alt="Maxim" className="w-full h-full object-cover" />
                                    </div>
                                    <div className="space-y-2">
                                        <h1 className="text-3xl md:text-5xl font-extrabold tracking-tight">Максим Сафрутин</h1>
                                        <div className="text-base md:text-lg text-gray-500 dark:text-gray-400 font-medium max-w-md mx-auto leading-tight">
                                            Корпоративный менеджер по продажам
                                            <span className="text-gray-400 font-light block text-sm md:text-base mt-1">
                                                (B2B, Тендеры, Автобизнес)
                                            </span>
                                        </div>
                                        <p className="text-gray-400 font-medium text-sm flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-location-dot"></i> Самара, Россия
                                        </p>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => setActiveSection('contacts')} className="bg-[#0071e3] text-white px-6 py-2.5 rounded-full font-semibold text-sm hover:bg-[#0077ed] transition-all">Связаться</button>
                                        <button onClick={() => setActiveSection('experience')} className="bg-gray-100 dark:bg-gray-800 text-[#1d1d1f] dark:text-white px-6 py-2.5 rounded-full font-semibold text-sm hover:opacity-80 transition-all">Открыть опыт</button>
                                    </div>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-6 rounded-[1.5rem] text-center border border-transparent dark:border-gray-800">
                                        <div className="text-3xl font-bold mb-1"><Counter endValue={630} suffix="+" /></div>
                                        <div className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Продано авто</div>
                                    </div>
                                    <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-6 rounded-[1.5rem] text-center border border-transparent dark:border-gray-800">
                                        <div className="text-3xl font-bold mb-1"><Counter endValue={311} suffix=" млн" /></div>
                                        <div className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Оборот (₽)</div>
                                    </div>
                                    <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-6 rounded-[1.5rem] text-center border border-transparent dark:border-gray-800">
                                        <div className="text-3xl font-bold mb-1"><Counter endValue={14} suffix=" млн" /></div>
                                        <div className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Валовая прибыль</div>
                                    </div>
                                </div>

                                <section className="max-w-2xl mx-auto text-center space-y-6">
                                    <div className="text-lg md:text-xl leading-relaxed font-medium text-gray-800 dark:text-gray-200">
                                        <p>С 1993 года — в переговорах. Внедряю системный подход и AI-инструменты в B2B продажи, превращая холодные контакты в долгосрочные контракты.</p>
                                    </div>
                                    <button onClick={() => setIsAboutOpen(true)} className="text-[#0066cc] text-base font-semibold hover:underline underline-offset-4">
                                        Подробнее об экспертизе →
                                    </button>
                                </section>
                            </div>
                        )}

                        {activeSection === 'experience' && (
                            <div className="space-y-8 animate-fade-up max-w-3xl mx-auto">
                                <h2 className="text-2xl font-bold tracking-tight">Профессиональный опыт</h2>
                                {experiences.map((item, idx) => (
                                    <div key={idx} className="flex flex-col gap-4">
                                        <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-6 rounded-[1.5rem] border border-transparent dark:border-gray-800">
                                            <div className="flex justify-between items-start mb-2">
                                                <span className="text-blue-600 font-bold text-[10px] uppercase">{item.year}</span>
                                            </div>
                                            <h3 className="text-xl font-bold">{item.company}</h3>
                                            <p className="text-sm text-blue-500 font-medium mb-3">{item.role}</p>
                                            <p className="text-gray-600 dark:text-gray-400 text-sm leading-relaxed">{item.details}</p>
                                        </div>
                                        <div className="bg-white dark:bg-black p-4 px-6 rounded-[1.5rem] border border-gray-100 dark:border-gray-800 italic text-xs text-gray-500">
                                            "{item.review}"
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeSection === 'skills' && (
                            <div className="space-y-8 animate-fade-up">
                                <h2 className="text-2xl font-bold tracking-tight">Навыки и Стек</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-6 rounded-[2rem] border border-transparent dark:border-gray-800 space-y-3">
                                        <h3 className="text-lg font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-chart-line text-blue-600"></i> Продажи</h3>
                                        {["B2B & B2G Продажи", "Тендеры (44-ФЗ, 223-ФЗ)", "Сложные переговоры", "Работа с ЛПР", "Электронный документооборот"].map(s => (
                                            <div key={s} className="bg-white dark:bg-black p-3 rounded-xl text-xs font-medium apple-shadow border border-gray-50 dark:border-gray-900">{s}</div>
                                        ))}
                                    </div>
                                    <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-6 rounded-[2rem] border border-transparent dark:border-gray-800 space-y-3">
                                        <h3 className="text-lg font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-robot text-blue-600"></i> AI & CRM</h3>
                                        {["ChatGPT (Prompt Engineering)", "1С: Предприятие", "CRM системы", "Аналитика продаж", "Создание обучающих материалов"].map(s => (
                                            <div key={s} className="bg-white dark:bg-black p-3 rounded-xl text-xs font-medium apple-shadow text-blue-600 border border-gray-50 dark:border-gray-900">{s}</div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeSection === 'personal' && (
                            <div className="space-y-6 animate-fade-up max-w-3xl mx-auto">
                                <h2 className="text-2xl font-bold tracking-tight mb-4 text-center">Личное</h2>
                                <div className="bg-[#1d1d1f] text-white p-8 rounded-[2rem]">
                                    <h3 className="text-xl font-bold mb-4">Принцип</h3>
                                    <p className="text-lg opacity-70 italic mb-4">«Система всегда побеждает хаос».</p>
                                    <p className="text-base leading-relaxed opacity-90 font-light">Верю, что дисциплина — это основа. Если в CRM порядок, значит в продажах будет результат.</p>
                                </div>
                                <div className="bg-[#f5f5f7] dark:bg-[#1c1c1e] p-8 rounded-[2rem] border border-transparent dark:border-gray-800">
                                    <h3 className="text-xl font-bold mb-4">Активность</h3>
                                    <p className="text-base leading-relaxed text-gray-600 dark:text-gray-400">Путешествия (35 стран), хореография, системное обучение. Трое детей и фокус на постоянное развитие.</p>
                                </div>
                            </div>
                        )}

                        {activeSection === 'contacts' && (
                            <div className="text-center py-6 animate-fade-up">
                                <h2 className="text-3xl font-extrabold tracking-tight mb-2">На связи</h2>
                                <p className="text-gray-400 mb-8">Для обсуждения проектов и предложений</p>
                                <div className="max-w-md mx-auto space-y-3">
                                    <a href="tel:+79272651777" className="flex items-center justify-between p-5 bg-[#f5f5f7] dark:bg-[#1c1c1e] rounded-2xl hover:scale-[1.01] transition-all border border-transparent dark:border-gray-800 shadow-sm">
                                        <div className="text-left">
                                            <div className="text-[10px] text-gray-400 font-bold uppercase">Личный сотовый</div>
                                            <div className="text-lg font-bold">8 (927) 265-17-77</div>
                                        </div>
                                        <i className="fa-solid fa-phone text-blue-600"></i>
                                    </a>
                                    <a href="mailto:max.safrutin@gmail.com" className="flex-1 p-5 bg-[#f5f5f7] dark:bg-[#1c1c1e] rounded-2xl block text-left border border-transparent dark:border-gray-800 shadow-sm transition-all hover:scale-[1.02]">
                                        <div className="text-[10px] text-gray-400 font-bold uppercase">Email</div>
                                        <div className="text-lg font-bold">max.safrutin@gmail.com</div>
                                    </a>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-lg nav-blur rounded-full apple-shadow border border-gray-200 dark:border-gray-800 z-50">
                        <div className="flex justify-around items-center h-16 px-2">
                            {[
                                { id: 'profile', label: 'Профиль', icon: 'fa-user' },
                                { id: 'experience', label: 'Опыт', icon: 'fa-briefcase' },
                                { id: 'skills', label: 'Навыки', icon: 'fa-bolt' },
                                { id: 'personal', label: 'Личное', icon: 'fa-heart' },
                                { id: 'contacts', label: 'Контакты', icon: 'fa-address-book' }
                            ].map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveSection(tab.id)}
                                    className={`flex flex-col items-center justify-center transition-all flex-1 ${activeSection === tab.id ? 'text-blue-600' : 'text-gray-400'}`}
                                >
                                    <i className={`fa-solid ${tab.icon} text-lg`}></i>
                                    <span className="text-[9px] font-bold uppercase mt-1 tracking-tighter">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    <Modal isOpen={isAboutOpen} onClose={() => setIsAboutOpen(false)} title="О специалисте">
                        <div className="space-y-4 text-sm leading-relaxed text-gray-800 dark:text-gray-200">
                            <p>Более 12 лет в управлении и продажах. Принимаю решения на основе аналитики. Увеличиваю прибыль через построение доверительных отношений с ЛПР.</p>
                            <p>30 декабря 1990 года, женат, трое детей. Цель — профессиональный рост в инновационных компаниях.</p>
                        </div>
                        <button onClick={() => { setIsAboutOpen(false); setActiveSection('skills'); }} className="w-full mt-6 bg-black dark:bg-white text-white dark:text-black py-4 rounded-2xl font-bold text-sm hover:opacity-90 transition-all">
                            Подробнее про навыки
                        </button>
                    </Modal>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
