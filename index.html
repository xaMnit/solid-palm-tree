                let start = 0;
                const duration = 1000;
                const increment = Math.ceil(endValue / (duration / 20));
                const timer = setInterval(() => {
                    start += increment;
                    if (start >= endValue) { setCount(endValue); clearInterval(timer); } 
                    else { setCount(start); }
                }, 20);
                return () => clearInterval(timer);
            }, [endValue]);
            return <span>{count}{suffix}</span>;

                                { id: 'contacts', label: 'Связь', icon: 'fa-address-book' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveSection(tab.id)} className={`flex flex-col items-center justify-center transition-all flex-1 ${activeSection === tab.id ? 'text-blue-600' : 'text-gray-400'}`}>
                                    <i className={`fa-solid ${tab.icon} text-lg`}></i>
                                    <span className="text-[9px] font-bold uppercase mt-1 tracking-tighter">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* МОДАЛЬНОЕ ОКНО: О СПЕЦИАЛИСТЕ */}
                    <Modal isOpen={isAboutOpen} onClose={() => setIsAboutOpen(false)} title="О специалисте">
                        <p>Более 12 лет в управлении продажами. Решения принимаю на основе аналитики и цифр. Архитектуру процессов веду к прогнозируемым и масштабируемым результатам. Увеличиваю прибыль компании через доверие клиента и решение его задачи, то есть конвертирую запрос в сделку.</p>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 py-6">
                            {[
                                { val: 1340, icon: "fa-car", txt: "Опыт продаж в автобизнесе.", suffix: " дн." },
                                { val: 1198, icon: "fa-star", txt: "Положительных отзывов клиентов.", suffix: "+" },
                                { val: 876, icon: "fa-diagram-project", txt: "Фриланс-проектов реализовано.", suffix: "+" },
                                { val: 192, icon: "fa-chalkboard-user", txt: "Преподавание и работа с аудиторией.", suffix: " нед." }
                            ].map((item, i) => (
                                <div key={i} className="p-4 bg-[#f5f5f7] dark:bg-gray-800/50 rounded-2xl flex items-start gap-3">
                                    <i className={`fa-solid ${item.icon} text-blue-500 mt-1 text-xs`}></i>
                                    <div>
                                        <div className="text-sm font-bold text-blue-600"><Counter endValue={item.val} suffix={item.suffix} /></div>
                                        <div className="text-[11px] leading-tight text-gray-500">{item.txt}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Modal>

                    {/* МОДАЛЬНОЕ ОКНО: ДЕТАЛИ ОПЫТА */}
                    {selectedExp && (
                        <Modal isOpen={true} onClose={() => setSelectedExp(null)} title={selectedExp.company}>
                            <div className="space-y-6">
                                <div>
                                    <h4 className="text-[10px] uppercase tracking-widest text-blue-600 font-bold mb-2">Обязанности и задачи</h4>
                                    <p className="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">{selectedExp.fullTasks}</p>
                                </div>
                                <div>
                                    <h4 className="text-[10px] uppercase tracking-widest text-green-600 font-bold mb-2">Результаты</h4>
                                    <p className="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">{selectedExp.fullResults}</p>
                                </div>
                                <div className="bg-gray-50 dark:bg-gray-900/50 p-5 rounded-2xl italic border border-gray-100 dark:border-gray-800">
                                    <h4 className="text-[10px] uppercase tracking-widest text-orange-600 font-bold mb-2 not-italic">Полный отзыв</h4>
                                    <p className="text-sm text-gray-600 dark:text-gray-400 leading-relaxed">"{selectedExp.fullReview}"</p>
                                    <div className="mt-3 text-xs font-bold not-italic">— {selectedExp.reviewAuthor}</div>
                                </div>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
