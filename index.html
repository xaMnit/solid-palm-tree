                const duration = 1000;
                const increment = Math.ceil(endValue / (duration / 20));

                const timer = setInterval(() => {
                    start += increment;
                    if (start >= endValue) {
                        setCount(endValue);
                        clearInterval(timer);
                    } else {
                        setCount(start);
                    }
                }, 20);

                return () => clearInterval(timer);
            }, [endValue]);

            return <span>{count}{suffix}</span>;
