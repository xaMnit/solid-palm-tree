const { useState, useEffect, useRef } = React;
const SCROLL_TOP_OFFSET = 56;
const smoothScrollToNode = (node, extraOffset = SCROLL_TOP_OFFSET) => {
    if (!node) return;
    window.requestAnimationFrame(() => {
        const rect = node.getBoundingClientRect();
        const targetTop = Math.max(window.scrollY + rect.top - extraOffset, 0);
        window.scrollTo({ top: targetTop, behavior: 'smooth' });
    });
};

const AnimatedCollapse = ({ isOpen, children, className = "", contentClassName = "", style = {} }) => {
    const innerRef = useRef(null);
    const [height, setHeight] = useState(isOpen ? 'auto' : 0);

    useEffect(() => {
        const node = innerRef.current;
        if (!node) return;

        if (isOpen) {
            const fullHeight = node.scrollHeight;
            setHeight(fullHeight);
            const timer = window.setTimeout(() => setHeight('auto'), 340);
            return () => window.clearTimeout(timer);
        }

        const fullHeight = node.scrollHeight;
        setHeight(fullHeight);
        const raf = window.requestAnimationFrame(() => setHeight(0));
        return () => window.cancelAnimationFrame(raf);
    }, [isOpen, children]);

    return React.createElement(
        "div",
        {
            className,
            style: {
                overflow: 'hidden',
                maxHeight: typeof height === 'number' ? `${height}px` : height,
                opacity: isOpen ? 1 : 0,
                transform: isOpen ? 'translateY(0)' : 'translateY(-4px)',
                transition: 'max-height 340ms cubic-bezier(0.22, 1, 0.36, 1), opacity 220ms ease, transform 340ms cubic-bezier(0.22, 1, 0.36, 1)',
                ...style
            }
        },
        React.createElement(
            "div",
            { ref: innerRef, className: `${contentClassName}${isOpen ? ' micro-card-opening' : ''}` },
            children
        )
    );
};

const Counter = ({ endValue, suffix = "" }) => {
    const [count, setCount] = useState(0);

    useEffect(() => {
        let start = 0;
        const duration = 900;
        const startTime = performance.now();

        const animate = (time) => {
            const progress = Math.min((time - startTime) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            const value = Math.floor(start + (endValue - start) * eased);
            setCount(value);
            if (progress < 1) requestAnimationFrame(animate);
        };

        requestAnimationFrame(animate);
    }, [endValue]);

    return `${count}${suffix}`;
};
