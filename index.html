<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maxim Safrutin</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>

<body class="bg-slate-900 text-slate-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

const resumeData = {

  profile: {
    name: "Максим Сафрутин",

    role: "Автомобильный брокер премиального сегмента",

    location: "Самара, Россия",

    bio:
      "С 1993 года в переговорах, с 2020 — в автомобильной отрасли. Увеличиваю прибыль компаний через доверие клиента, решая его задачу. Конвертирую запрос в результативно закрытую сделку.",

    avatar: "./Ава Сафрутин от 26.05.2022.png",

    socials: [
      {
        name: "Telegram",
        iconClass: "ph-paper-plane-right",
        url: "https://t.me/max_safrutin"
      }
    ]
  },

  skills: [
    { name: "Переговоры", level: 95 },
    { name: "Продажи", level: 95 },
    { name: "Автомобильный рынок", level: 90 },
    { name: "Подбор автомобилей", level: 90 },
    { name: "Работа с клиентами", level: 95 }
  ],

  contacts: {
    email: "example@mail.ru",
    phone: "+7 000 000 00 00",
    telegram: "@max_safrutin"
  }

};


function App() {

  const [activeTab, setActiveTab] = useState('profile');
  const [darkMode, setDarkMode] = useState(true);
  const [mounted, setMounted] = useState(false);

  useEffect(() => {
    setMounted(true);
  }, []);

  if (!mounted) return null;

  const toggleTheme = () => setDarkMode(!darkMode);

  const TabButton = ({ id, iconClass, label }) => (
    <button
      onClick={() => setActiveTab(id)}
      className={`flex flex-col items-center justify-center w-full py-2 ${
        activeTab === id ? 'text-blue-400' : 'text-gray-500'
      }`}
    >
      <i className={`ph ${iconClass} text-[24px]`}></i>
      <span className="text-[10px]">{label}</span>
    </button>
  );

  return (

<div className="min-h-screen bg-slate-900 text-slate-100">

<header className="fixed top-0 w-full bg-slate-900/80 backdrop-blur border-b border-slate-800 z-50">

<div className="max-w-md mx-auto px-4 h-16 flex items-center justify-between">

<h1 className="font-bold text-lg">
Maxim Safrutin
</h1>

<button onClick={toggleTheme} className="p-2 rounded-full bg-slate-800">
<i className="ph-fill ph-sun"></i>
</button>

</div>
</header>

<main className="max-w-md mx-auto pt-20 pb-24 px-4">

{activeTab === 'profile' && (

<div className="space-y-6 animate-fadeIn">

<div className="text-center space-y-4">

<img
src={resumeData.profile.avatar}
className="w-32 h-32 rounded-full mx-auto object-cover"
/>

<div>

<h2 className="text-3xl font-bold">
{resumeData.profile.name}
</h2>

<p className="text-blue-400">
{resumeData.profile.role}
</p>

<p className="text-sm text-slate-400">
{resumeData.profile.location}
</p>

</div>

<div className="flex justify-center gap-3">

{resumeData.profile.socials.map((social) => (

<a
key={social.name}
href={social.url}
target="_blank"
className="p-3 bg-slate-800 rounded-xl"
>

<i className={`ph ${social.iconClass} text-xl`}></i>

</a>

))}

</div>

</div>

<div className="p-5 bg-slate-800 rounded-2xl">

<h3 className="font-semibold mb-2">
Обо мне
</h3>

<p className="text-slate-300 text-sm">
{resumeData.profile.bio}
</p>

</div>

</div>

)}

</main>

<nav className="fixed bottom-0 w-full border-t border-slate-800 bg-slate-900">

<div className="max-w-md mx-auto flex justify-around h-16">

<TabButton id="profile" iconClass="ph-user" label="Профиль" />
<TabButton id="skills" iconClass="ph-code" label="Навыки" />
<TabButton id="contacts" iconClass="ph-envelope-simple" label="Контакты" />

</div>

</nav>

</div>

);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
