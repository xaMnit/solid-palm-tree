    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { appleBlue: '#0071e3' } } }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .nav-blur { backdrop-filter: blur(20px); background: rgba(255,255,255,0.8); }
        .dark .nav-blur { background: rgba(0,0,0,0.8); }
        .apple-shadow { box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .timeline-line { position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #2c2c2e; }
        .exp-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .rotate-180 { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-white text-[#1d1d1f] dark:bg-black dark:text-[#f5f5f7]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ДАННЫЕ ОПЫТА (ОРИГИНАЛЫ) ---
        const ExperienceData = [
            {
                id: 1,
                period: "09/2023 — 02/2026",
                company: "АМК УРАЛ-ЛАДА КОРП",
                legal: "ООО «Урал-Лада» (а/м холдинг АМК)",
                url: "https://urallada63.lada.ru",
                address: "Самара, Мира, 1",
                mapUrl: "https://yandex.ru/maps/org/ural_lada/228897792896",
                role: "Корпоративный менеджер по работе с ЮЛ",
                shortFocus: "Развитие B2B-продаж LADA, переговоры с ЛПР, тендеры и ЭДО.",
                shortResults: "630+ авто, 311 млн ₽ оборота, 14 млн ₽ прибыли.",
                shortReview: "«Ему можно доверить целое направление. Максим доводит задачи до результата...»",
                reviewAuthor: "Анастасия Мовчан (Корп. РОП)",
                fullTasks: "Развитие B2B-продаж LADA, переговоры с ЛПР, корпоративные поставки, сопровождение сделок через CRM, 1С и электронный документооборот.",
                fullResults: "630+ автомобилей LADA. 311 млн ₽ оборота. 14 млн ₽ валовой прибыли. Корпоративное направление фактически велось одним менеджером: сформирована и систематизирована база клиентов, выстроены устойчивые партнёрские отношения с компаниями региона.",
                fullReview: "«Ему можно доверить целое направление. Максим берёт ответственность за весь процесс и доводит задачи до результата.» \n\n Контакт: Анастасия Мовчан, Корп. РОП АМК"
            },
            {
                id: 2,
                period: "06/2023 — 09/2023",
                company: "АМК УРАЛ-ЛАДА РОЗНИЦА",
                legal: "ООО «Урал-Лада» (а/м холдинг АМК)",
                url: "https://urallada63.lada.ru",
                address: "Самара, Мира, 1",
                mapUrl: "https://yandex.ru/maps/org/ural_lada/228897792896",
                role: "Менеджер отдела продаж новых авто",
                shortFocus: "Продажи LADA, trade-in, запуск дилерского центра.",
                shortResults: "Открытие салона с нуля, оптимизация рабочих листов.",
                shortReview: "«На старте фактически помог удержать и запустить работу отдела...»",
                reviewAuthor: "Джамиль Якупов (РОП LADA)",
                fullTasks: "Фокус: продажи новых автомобилей LADA, сделки с пробегом, trade-in, кредитные программы, участие в запуске дилерского центра.",
                fullResults: "Участвовал в открытии автосалона с нуля, работал в условиях высокой нагрузки и многозадачности. Оптимизировал рабочий лист менеджера, что упростило контроль сделок и сопровождение клиентов.",
                fullReview: "«На старте фактически помог удержать и запустить работу отдела. Позже именно он выстроил корпоративное направление.» \n\n Контакт: Джамиль Якупов, РОП LADA"
            },
            {
                id: 3,
                period: "05/2008 — Наст. время",
                company: "MC / Event (Фриланс)",
                legal: "На договорах между физ. Лицами",
                url: "https://vk.com/max_wedding63",
                address: "География проектов (Padlet)",
                mapUrl: "https://padlet.com/maxsafrutin/padlet-c0o969gn0sq2bpsu",
                role: "Организатор, ведущий",
                shortFocus: "Организация мероприятий, управление командой и подрядчиками.",
                shortResults: "Многолетний опыт работы с людьми и эмоцией аудитории.",
                shortReview: "«Сотни успешных событий и база лояльных клиентов...»",
                reviewAuthor: "Клиенты",
                fullTasks: "Организация мероприятий, работа с аудиторией, управление командой и подрядчиками.",
                fullResults: "Сформирована собственная база клиентов и команда по организации мероприятий. Многолетний опыт работы с людьми, эмоцией аудитории и сценарием событий.",
                fullReview: "Отзывы вынесены в отдельный раздел в Padlet и VK. Контакты заказчиков предоставляются по запросу."
            }
        ];

        // --- КОМПОНЕНТ: POPUP ---
        const Popup = ({ isOpen, onClose, title, content }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-[#1c1c1e] text-white rounded-[2rem] max-w-lg w-full p-8 shadow-2xl animate-fade-up border border-white/10" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xs uppercase tracking-widest text-gray-400 font-bold">{title}</h3>
                            <button onClick={onClose} className="text-gray-500 hover:text-white transition-colors text-xl">✕</button>
                        </div>
                        <div className="text-base leading-relaxed whitespace-pre-wrap">{content}</div>
                    </div>
                </div>
            );
        };

        // --- КАРТОЧКА ОПЫТА (ACCORDION) ---
        const ExpCard = ({ item }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            const [popup, setPopup] = useState({ open: false, title: '', content: '' });

            return (
                <div className="relative pl-12 pb-8 group">
                    <div className="absolute left-[18px] top-4 w-1.5 h-1.5 rounded-full bg-blue-600 z-10"></div>
                    <div className="bg-[#1c1c1e] rounded-[1.5rem] overflow-hidden border border-white/5 apple-shadow">
                        {/* Видимая часть (Header) */}
                        <div 
                            className="p-6 cursor-pointer flex justify-between items-start hover:bg-white/5 transition-colors"
                            onClick={() => setIsExpanded(!isExpanded)}
                        >
                            <div className="space-y-1">
                                <span className="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">{item.period}</span>
                                <h3 className="text-lg font-extrabold text-blue-500 flex items-center gap-2">
                                    <a href={item.url} target="_blank" onClick={e => e.stopPropagation()} className="hover:underline">{item.company}</a>
                                </h3>
                                <div className="text-[10px] text-gray-500 leading-tight italic">{item.legal}</div>
                                <div className="text-sm font-bold text-gray-200 mt-2">{item.role}</div>
                                <div className="flex items-center gap-1.5 text-[11px] text-gray-500 mt-1">
                                    <i className="fa-solid fa-location-dot text-[9px]"></i>
                                    <a href={item.mapUrl} target="_blank" onClick={e => e.stopPropagation()} className="hover:text-blue-400 underline decoration-blue-500/30">{item.address}</a>
                                </div>
                            </div>
                            <i className={`fa-solid fa-chevron-down text-gray-600 mt-1 transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}></i>
                        </div>

                        {/* Выдвижная часть (Notion Style) */}
                        {isExpanded && (
                            <div className="px-6 pb-6 pt-2 border-t border-white/5 bg-white/[0.02] space-y-6 animate-fade-up">
                                <div>
                                    <h4 className="text-[9px] uppercase tracking-widest text-blue-500 font-bold mb-1">Фокус:</h4>
                                    <p className="text-sm text-gray-400 line-clamp-2">{item.shortFocus}</p>
                                    <button onClick={() => setPopup({ open: true, title: 'Задачи и фокус', content: item.fullTasks })} className="text-[10px] font-bold text-blue-400 mt-1 hover:underline">Подробнее</button>
                                </div>
                                <div>
                                    <h4 className="text-[9px] uppercase tracking-widest text-green-500 font-bold mb-1">Результат:</h4>
                                    <p className="text-sm text-gray-400 line-clamp-2">{item.shortResults}</p>
                                    <button onClick={() => setPopup({ open: true, title: 'Результаты', content: item.fullResults })} className="text-[10px] font-bold text-green-400 mt-1 hover:underline">Подробнее</button>
                                </div>
                                <div className="border-l-2 border-orange-500/20 pl-4 py-1">
                                    <h4 className="text-[9px] uppercase tracking-widest text-orange-500 font-bold mb-1">Отзыв:</h4>
                                    <p className="text-sm italic text-gray-400 line-clamp-2">{item.shortReview}</p>
                                    <div className="text-[10px] font-bold text-gray-200 mt-1">— {item.reviewAuthor}</div>
                                    <button onClick={() => setPopup({ open: true, title: 'Полный отзыв и контакты', content: item.fullReview })} className="text-[10px] font-bold text-orange-400 mt-1 hover:underline">Подробнее</button>
                                </div>
                            </div>
                        )}
                    </div>
                    <Popup isOpen={popup.open} onClose={() => setPopup({ ...popup, open: false })} title={popup.title} content={popup.content} />
                </div>
            );
        };

        const App = () => {
            const [activeSection, setActiveSection] = useState('profile');
            const [isAboutOpen, setIsAboutOpen] = useState(false);

            return (
                <div className="min-h-screen pb-28">
                    <nav className="fixed top-0 w-full nav-blur z-50 border-b border-white/5">
                        <div className="max-w-4xl mx-auto px-6 h-14 flex items-center justify-between">
                            <span className="font-bold text-sm tracking-tight">MAX <span className="text-blue-600">SAFRUTIN</span></span>
                            <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-bold">MS</div>
                        </div>
                    </nav>

                    <main className="max-w-2xl mx-auto px-6 pt-24">
                        {activeSection === 'profile' ? (
                            <div className="animate-fade-up space-y-12">
                                <header className="flex flex-col items-center text-center space-y-6">
                                    <div className="w-32 h-32 md:w-40 md:h-40 rounded-[3rem] overflow-hidden apple-shadow ring-4 ring-blue-600/20">
                                        <img src="https://ui-avatars.com/api/?name=Максим+Сафрутин&background=1c1c1e&color=fff&size=512" alt="Maxim" />
                                    </div>
                                    <div>
                                        <h1 className="text-4xl font-extrabold tracking-tight">Максим Сафрутин</h1>
                                        <p className="text-gray-500 mt-2 font-medium">Менеджер по продажам автомобилей</p>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => setActiveSection('experience')} className="bg-blue-600 px-8 py-3 rounded-full font-bold text-sm hover:bg-blue-700 transition-all">Опыт работы</button>
                                        <button onClick={() => setIsAboutOpen(true)} className="bg-white/5 px-8 py-3 rounded-full font-bold text-sm border border-white/10">О специалисте</button>
                                    </div>
                                </header>
                                
                                <div className="bg-[#1c1c1e] p-8 rounded-[2rem] border border-white/5 text-center space-y-4">
                                    <p className="text-lg font-medium leading-relaxed">
                                        С 1993 года — в переговорах, с 2020 — в автомобильных. Работаю системно, используя AI-инструменты для кратного роста прибыли.
                                    </p>
                                    <button onClick={() => setIsAboutOpen(true)} className="text-blue-500 font-bold text-sm">Подробнее об экспертизе →</button>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-fade-up">
                                <h2 className="text-2xl font-black mb-10 text-center uppercase tracking-widest">Профессиональный путь</h2>
                                <div className="relative">
                                    <div className="timeline-line"></div>
                                    {ExperienceData.map(item => <ExpCard key={item.id} item={item} />)}
                                </div>
                                <button onClick={() => setActiveSection('profile')} className="mt-8 w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold text-xs uppercase tracking-widest">На главную</button>
                            </div>
                        )}
                    </main>

                    {/* ОРИГИНАЛЬНОЕ ОКНО "О СПЕЦИАЛИСТЕ" (ВОССТАНОВЛЕНО) */}
                    {isAboutOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md" onClick={() => setIsAboutOpen(false)}>
                            <div className="bg-[#1c1c1e] rounded-[2.5rem] max-w-lg w-full p-8 shadow-2xl border border-white/10" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold">О специалисте</h3>
                                    <button onClick={() => setIsAboutOpen(false)} className="text-gray-500 text-2xl">✕</button>
                                </div>
                                <div className="space-y-6 text-sm text-gray-300 leading-relaxed">
                                    <p>Более 12 лет в управлении продажами. Решения принимаю на основе аналитики и цифр. Архитектуру процессов веду к прогнозируемым и масштабируемым результатам. Увеличиваю прибыль компании через доверие клиента и решение его задачи, то есть конвертирую запрос в сделку.</p>
                                    <p className="pt-2">Родился Козерогом в год Лошади 30 декабря 1990 года, женат, трое детей, в планах — купить / построить дом</p>
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4">
                                        {[
                                            { val: "1340 дн.", icon: "fa-car", txt: "Опыт в автобизнесе" },
                                            { val: "1198+", icon: "fa-star", txt: "Живых отзывов" },
                                            { val: "876+", icon: "fa-diagram-project", txt: "Реализовано проектов" },
                                            { val: "192 нед.", icon: "fa-chalkboard-user", txt: "Работа с аудиторией" }
                                        ].map((item, i) => (
                                            <div key={i} className="p-4 bg-white/5 rounded-2xl flex items-center gap-4">
                                                <i className={`fa-solid ${item.icon} text-blue-500 text-xl`}></i>
                                                <div>
                                                    <div className="text-base font-bold text-white">{item.val}</div>
                                                    <div className="text-[10px] text-gray-500 uppercase font-bold tracking-tighter">{item.txt}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
